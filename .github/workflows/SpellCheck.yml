name: "Spell Check"

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  spellcheck:
    name: "Spell Check"
    uses: "SciML/.github/.github/workflows/spellcheck.yml@v1"
    secrets: "inherit"
